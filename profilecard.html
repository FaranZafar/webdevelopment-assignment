<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
        }
        .card{
            width: 350;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover{
            transform: translateY(-10px);
        }
        .profile-img{
           width: 120px;
           height: 120px;
           border-radius: 50%;
           object-fit: cover;
           border: 4px solid #4facfe;
        }
        h2{
            margin-top:15px ;
            color: #333;
        }
        .bio{
            margin-top: 10px;
            color: #666;
            line-height: 1.5;
        }
        .social-links{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;

        }
        .social-links a{
            text-decoration: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .facebook{
            background: #1877f2;
        }
        .github{
            background: #333;
        }
        .social-links a:hover{
            opacity: 0.8;
        }
        .contact-btn{
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: #4facfe;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            border-radius: 10px;
        }
        .contact-btn:hover{
            background: #2b8eff;
        }

    </style>

</head>
<body>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500" alt="Profile" class="profile-img">
        <h2>Faran Zafar</h2>
        <p class="bio">Software Engineering student
            precticing html,css,javascript
        </p>
        <div class="social-links">
            <a href="#" class="facebook">Facebook</a>
            <a href="#" class="github">Github</a>
        </div>
        <button class="contact-btn">
            contact me
        </button>
    </div>
</body>
</html>
