<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Generator & Reader</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card-custom{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    padding:30px;
}

#qrcode{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

canvas{
    max-width:100%;
}

.result-box{
    min-height:80px;
    background:#f8f9fa;
    border-radius:10px;
    padding:15px;
    word-break:break-word;
}

</style>
</head>
<body>

<div class="container">

<div class="card-custom">

<div class="row g-4">

<!-- QR Generator -->

<div class="col-md-6">

<h3 class="text-center mb-4">
Generate QR Code
</h3>

<input
type="text"
id="qrText"
class="form-control mb-3"
placeholder="Enter text or URL">

<button
class="btn btn-primary w-100"
onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

</div>

<!-- QR Reader -->

<div class="col-md-6">

<h3 class="text-center mb-4">
Read QR Code
</h3>

<input
type="file"
id="fileInput"
class="form-control mb-3"
accept="image/*">

<button
class="btn btn-success w-100 mb-3"
onclick="readQR()">
Read QR
</button>

<h5>Decoded Text:</h5>

<div id="result" class="result-box">
Upload a QR image...
</div>

</div>

</div>

</div>

</div>

<script>

// Generate QR

function generateQR(){

    let text = document.getElementById("qrText").value;

    if(text.trim()===""){
        alert("Enter some text");
        return;
    }

    document.getElementById("qrcode").innerHTML="";

    new QRCode(
        document.getElementById("qrcode"),
        {
            text:text,
            width:250,
            height:250
        }
    );
}


// Read QR

function readQR(){

    const file =
    document.getElementById("fileInput").files[0];

    if(!file){
        alert("Please select a QR image");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(event){

        const img = new Image();

        img.onload = function(){

            const canvas =
            document.createElement("canvas");

            const ctx =
            canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img,0,0);

            const imageData =
            ctx.getImageData(
                0,
                0,
                canvas.width,
                canvas.height
            );

            const code = jsQR(
                imageData.data,
                canvas.width,
                canvas.height
            );

            if(code){

                document.getElementById(
                    "result"
                ).innerHTML =
                code.data;

            }else{

                document.getElementById(
                    "result"
                ).innerHTML =
                "No QR code found.";

            }

        };

        img.src = event.target.result;
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
